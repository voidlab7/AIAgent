<!-- 论坛文章模板 — 纯内联样式，无外部资源 -->
<div style="max-width:760px; margin:0 auto; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; color:#1a1a1a; line-height:1.8; font-size:15px;">

  <!-- 标题区 -->
  <div style="text-align:center; padding:32px 0 24px;">
    <h1 style="font-size:32px; font-weight:900; color:#1a1a1a; margin:0 0 8px; line-height:1.4;">文章主标题</h1>
    <p style="color:#888; font-size:15px; margin:0 0 24px;">副标题 <span style="color:#e8913a; font-weight:700;">强调词</span></p>
  </div>

  <!-- 开篇引言 -->
  <blockquote style="border-left:3px solid #e8913a; padding:16px 20px; margin:20px 0 32px; background:#fdf8f3; color:#1a1a1a; font-size:14px; line-height:1.9;">
    全文核心观点概括。<br>
    可以用 <strong>加粗</strong> 强调。
  </blockquote>

  <hr style="border:none; border-top:1px solid #eae8e4; margin:32px 0;">

  <!-- CHAPTER 01 -->
  <p style="font-size:12px; color:#e8913a; letter-spacing:2px; margin:0 0 4px;">CHAPTER 01</p>
  <h2 style="font-size:20px; font-weight:800; color:#1a1a1a; margin:0 0 16px; line-height:1.4;">章节标题 <span style="color:#888; font-weight:400; font-size:13px; margin-left:8px;">ENGLISH SUBTITLE</span></h2>

  <p style="font-size:15px; color:#333; line-height:2; margin-bottom:14px;">正文段落。<strong>加粗关键句</strong>。<span style="color:#e8913a; font-weight:500;">主题色强调</span>。</p>

  <!-- 居中观点卡片 -->
  <div style="text-align:center; padding:24px; background:#fff; border:1px solid #eae8e4; border-radius:8px; margin:20px 0;">
    <div style="font-size:18px; font-weight:700; color:#1a1a1a; margin-bottom:6px;">核心公式 = <span style="color:#e8913a;">A</span> + <span style="color:#e8913a;">B</span></div>
    <div style="font-size:13px; color:#888;">补充说明</div>
  </div>

  <p style="font-size:15px; color:#333; line-height:2; margin-bottom:14px;">继续正文段落。</p>

  <blockquote style="border-left:3px solid #e8913a; padding:14px 20px; margin:20px 0; background:#fdf8f3; color:#555; font-size:14px; line-height:1.8; font-style:italic;">
    章节总结引言。
  </blockquote>

  <hr style="border:none; border-top:1px solid #eae8e4; margin:36px 0;">

  <!-- CHAPTER 02 -->
  <p style="font-size:12px; color:#e8913a; letter-spacing:2px; margin:0 0 4px;">CHAPTER 02</p>
  <h2 style="font-size:20px; font-weight:800; color:#1a1a1a; margin:0 0 16px; line-height:1.4;">第二章标题 <span style="color:#888; font-weight:400; font-size:13px; margin-left:8px;">SUBTITLE</span></h2>

  <p style="font-size:15px; color:#333; line-height:2; margin-bottom:14px;">正文内容。</p>

  <!-- 结语 -->
  <hr style="border:none; border-top:1px solid #eae8e4; margin:40px 0;">

  <div style="text-align:center; padding:20px 0 32px;">
    <h2 style="font-size:22px; font-weight:900; color:#1a1a1a; margin:0 0 16px; line-height:1.5;">结语标题</h2>
    <p style="font-size:14px; color:#555; max-width:520px; margin:0 auto 24px; line-height:2;">结语正文。</p>
    <div style="max-width:480px; margin:0 auto; padding:18px 24px; background:#fdf8f3; border:1px solid #f0dcc8; border-radius:8px; font-size:15px; font-weight:700; color:#e8913a;">
      ✦ 收尾金句 ✦
